name: Fare check

on:
  workflow_dispatch:
    inputs:
      max_searches:
        description: Searches to run during this manual test
        required: false
        default: "1"
      run_discovery:
        description: Include date-first destination discovery and exact verification
        required: false
        type: boolean
        default: false
      run_constructions:
        description: Include evidence-selected split, nearby-airport, or open-jaw checks
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: fare-check
  cancel-in-progress: false

jobs:
  check-fares:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Run tests
        run: npm run check

      - name: Check fares
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REQUIRE_NOTIFICATION_CHANNEL: "true"
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' }}
          MAX_SEARCHES_PER_RUN: ${{ inputs.max_searches }}
          MAX_CALLS_PER_CYCLE: ${{ github.event_name == 'workflow_dispatch' && inputs.max_searches || '' }}
          DISCOVERY_ENABLED: ${{ github.event_name != 'workflow_dispatch' || inputs.run_discovery }}
          CONSTRUCTIONS_ENABLED: ${{ github.event_name != 'workflow_dispatch' || inputs.run_constructions }}
        run: node scripts/check-fares.js

      - name: Commit fare history
        if: always()
        run: |
          if [ -n "$(git status --porcelain data/fare-history.json data/worker-state.json data/transit-policy-cache.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/fare-history.json data/worker-state.json data/transit-policy-cache.json
            git commit -m "Update fare tracking state"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then exit 0; fi
              git rebase --abort || true
              if [ "$attempt" = "3" ]; then exit 1; fi
              sleep 5
            done
          fi
